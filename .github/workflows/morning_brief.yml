name: Morning Brief

on:
  schedule:
    # 6:00 AM PT = 14:00 UTC (UTC-8 in winter / UTC-7 in summer)
    # Using 14:00 UTC which = 6am PT (PST). In PDT season it runs at 7am — adjust to 13:00 if needed.
    - cron: '0 14 * * *'
  workflow_dispatch:  # lets you trigger it manually from GitHub to test

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run morning brief
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GMAIL_ADDRESS:    ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS:   ${{ secrets.GMAIL_APP_PASS }}
          TO_EMAIL:         ${{ secrets.TO_EMAIL }}
        run: python morning_brief_v2.py
